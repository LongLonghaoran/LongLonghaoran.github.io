// ====== State ======
let expandedGroups = new Set();
let expandedNotebooks = new Set();

// ====== Init ======
function init() {
  updateStats();
  renderList();
}

function updateStats() {
  let totalNB = 0, totalNotes = 0;
  DATA.forEach(g => {
    totalNB += g.notebooks.length;
    g.notebooks.forEach(n => totalNotes += n.count);
  });
  document.getElementById('statsBar').textContent = `${DATA.length} 个笔记本组 · ${totalNB} 个笔记本 · ${totalNotes} 篇笔记`;
}

// ====== Render List ======
function renderList(filterQuery) {
  const container = document.getElementById('notebookList');
  let html = '';
  let hasAnyResult = false;

  DATA.forEach((group, gi) => {
    // Filter notebooks
    let visibleNBs = group.notebooks;
    if (filterQuery) {
      const q = filterQuery.toLowerCase();
      visibleNBs = group.notebooks.filter(nb =>
        nb.name.toLowerCase().includes(q) ||
        nb.notes.some(n => n[0].toLowerCase().includes(q))
      );
    }
    if (visibleNBs.length === 0) return;
    hasAnyResult = true;

    const isExpanded = expandedGroups.has(gi) || !!filterQuery;
    const groupTotal = visibleNBs.reduce((s, nb) => s + nb.count, 0);

    html += `<div class="group-section">`;
    html += `<div class="group-header ${isExpanded ? 'expanded' : ''}" onclick="toggleGroup(${gi})">`;
    html += `<span class="group-icon">${group.icon}</span>`;
    html += `<span class="group-name">${esc(group.name)}</span>`;
    html += `<span class="group-count">${visibleNBs.length} 个笔记本 · ${groupTotal} 篇</span>`;
    html += `<span class="group-chevron">▸</span>`;
    html += `</div>`;

    if (isExpanded) {
      html += `<div class="notebook-items">`;
      visibleNBs.forEach((nb, ni) => {
        const key = `${gi}-${ni}`;
        const isNbExpanded = expandedNotebooks.has(key) || !!filterQuery;
        let filteredNotes = nb.notes;
        if (filterQuery) {
          const q = filterQuery.toLowerCase();
          filteredNotes = nb.notes.filter(n => n[0].toLowerCase().includes(q));
        }

        html += `<div class="notebook-item ${isNbExpanded ? 'expanded' : ''}">`;
        html += `<div class="notebook-item-header" onclick="toggleNotebook('${key}')">`;
        html += `<span class="notebook-item-icon">📒</span>`;
        html += `<span class="notebook-item-name">${esc(nb.name)}</span>`;
        html += `<span class="notebook-item-count">${filteredNotes.length} 篇</span>`;
        html += `<span class="notebook-item-chevron">▾</span>`;
        html += `</div>`;

        if (isNbExpanded) {
          html += `<div class="notes-panel">`;
          filteredNotes.forEach(note => {
            const title = esc(note[0]);
            const url = note[1];
            const safeUrl = url === '#' ? 'javascript:void(0)' : url;
            const onclick = url === '#' ? ` onclick="alert('请先在印象笔记 App 中分享这篇笔记获取链接');return false;"` : '';
            html += `<div class="note-item">`;
            html += `<span class="note-item-bullet">●</span>`;
            html += `<span class="note-item-title"><a href="${safeUrl}" target="_blank" rel="noopener" title="${title}"${onclick}>${highlight(title, filterQuery)}</a></span>`;
            html += `<span class="note-item-arrow">↗</span>`;
            html += `</div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html;
  document.getElementById('noResults').style.display = hasAnyResult ? 'none' : 'block';
}

// ====== Toggle ======
function toggleGroup(idx) {
  if (expandedGroups.has(idx)) expandedGroups.delete(idx);
  else expandedGroups.add(idx);
  renderList(document.getElementById('searchInput').value.trim());
}

function toggleNotebook(key) {
  if (expandedNotebooks.has(key)) expandedNotebooks.delete(key);
  else expandedNotebooks.add(key);
  renderList(document.getElementById('searchInput').value.trim());
}

// ====== Search ======
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  renderList(q);
}

// ====== Utils ======
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:var(--accent);color:#fff;padding:0 2px;border-radius:3px;">$1</mark>');
}

// ====== Theme ======
function toggleTheme() {
  const h = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (h.getAttribute('data-theme') === 'dark') {
    h.setAttribute('data-theme', 'light');
    btn.textContent = '🌙';
    localStorage.setItem('theme', 'light');
  } else {
    h.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
    localStorage.setItem('theme', 'dark');
  }
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }
})();

// ====== Start ======
init();
</script>
