<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技术笔记 — 龙浩然 | Long HaoRan</title>
  <meta name="description" content="龙浩然的技术笔记归档，涵盖云原生、AI、编程语言、网络安全等领域，435篇笔记">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">LongHaoRan</a>
      <ul class="navbar-links">
        <li><a href="index.html">关于我</a></li>
        <li><a href="articles.html" class="active">技术笔记</a></li>
        <li><a href="resume.html">在线简历</a></li>
      </ul>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="切换暗色/亮色主题">🌙</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="section" style="padding-top: 7rem; min-height: 80vh;">

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">首页</a>
      <span class="separator">/</span>
      <span class="current" id="breadcrumb-current">技术笔记</span>
    </div>

    <!-- Search -->
    <div class="article-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="noteSearch" placeholder="搜索笔记标题... (435篇笔记中搜索)" oninput="performSearch()">
    </div>

    <!-- View: Group Grid (default) -->
    <div id="view-groups">
      <div class="section-nav-bar">
        <span class="view-title">📚 笔记本组</span>
        <span style="color: var(--text-muted); font-size: 0.9rem;" id="total-stats"></span>
      </div>
      <div class="group-grid" id="groupGrid"></div>
    </div>

    <!-- View: Notebook Detail (after clicking a group) -->
    <div id="view-detail" style="display:none;">
      <div class="section-nav-bar">
        <button class="back-btn" onclick="goBackToGroups()">← 返回笔记本组</button>
        <span class="view-title" id="detail-title"></span>
        <span style="color: var(--text-muted); font-size: 0.9rem;" id="detail-stats"></span>
      </div>
      <div class="notebook-list" id="notebookList"></div>
      <div class="empty-state" id="searchEmpty" style="display:none;">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">没有找到匹配的笔记</div>
        <p style="font-size:0.85rem;">尝试使用不同的关键词</p>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="index.html">关于我</a>
        <a href="articles.html">技术笔记</a>
        <a href="resume.html">在线简历</a>
      </div>
      <p class="footer-text">&copy; 2026 LongHaoRan. Powered by GitHub Pages.</p>
    </div>
  </footer>

  <!-- Data Layer -->
  <script>
    // ========== 数据（从 JSON 文件加载） ==========
    let articlesData = null;
    let currentView = 'groups'; // 'groups' | 'detail'
    let currentGroupIdx = -1;

    // 笔记本显示名
    const DISPLAY_NAMES = {
      "云原生": "Kubernetes / 云原生",
      "分布式存储": "分布式存储",
      "虚拟化": "虚拟化技术",
      "Linux": "Linux 系统",
      "puppet": "Puppet 配置管理",
      "Golang": "Golang",
      "python": "Python",
      "ruby笔记本组": "Ruby",
      "C": "C 语言",
      "C++": "C++",
      "java": "Java",
      "AI": "人工智能",
      "CUDA": "CUDA",
      "计算机网络": "计算机网络",
      "HTTP": "HTTP 协议",
      "Grpc": "gRPC",
      "安全防护": "安全防护",
      "关于加密解密": "加密解密",
      "CI/CD笔记本组": "CI/CD",
      "OpenApi": "OpenAPI",
      "Mysql": "MySQL",
    };

    // ========== 加载数据 ==========
    fetch('assets/data/articles-data.json')
      .then(r => r.json())
      .then(data => {
        articlesData = data;
        initPage();
      })
      .catch(() => {
        // 离线回退: 使用内联数据
        console.warn('无法加载数据文件，尝试使用内联回退');
      });

    function getDisplayName(key) {
      return DISPLAY_NAMES[key] || key;
    }

    function getTotalStats() {
      if (!articlesData) return '';
      let totalNotebooks = 0, totalNotes = 0;
      articlesData.groups.forEach(g => {
        totalNotebooks += g.notebooks.length;
        g.notebooks.forEach(n => totalNotes += n.count);
      });
      return `${articlesData.groups.length} 个笔记本组 · ${totalNotebooks} 个笔记本 · ${totalNotes} 篇笔记`;
    }

    // ========== 初始化 ==========
    function initPage() {
      document.getElementById('total-stats').textContent = getTotalStats();
      renderGroupGrid();
    }

    // ========== 渲染笔记本组网格 ==========
    function renderGroupGrid() {
      const grid = document.getElementById('groupGrid');
      grid.innerHTML = articlesData.groups.map((g, idx) => {
        const notebooks = g.notebooks;
        const totalNotes = notebooks.reduce((s, n) => s + n.count, 0);
        const nbPreview = notebooks.slice(0, 3).map(n => getDisplayName(n.key)).join(' · ');
        const more = notebooks.length > 3 ? ` +${notebooks.length - 3}` : '';

        return `
        <div class="group-card" onclick="openGroup(${idx})" tabindex="0" role="button" 
             onkeydown="if(event.key==='Enter')openGroup(${idx})">
          <div class="group-card-header">
            <div class="group-card-icon">${g.icon}</div>
            <div class="group-card-info">
              <div class="group-card-name">${g.name}</div>
              <div class="group-card-desc">${g.desc}</div>
              <div class="group-card-meta">📒 ${notebooks.length} 个笔记本 · 📝 ${totalNotes} 篇笔记</div>
              <div class="group-stats">
                <span class="group-stat-badge">${nbPreview}${more}</span>
              </div>
            </div>
            <div class="group-card-arrow">→</div>
          </div>
        </div>`;
      }).join('');
    }

    // ========== 打开笔记本组 ==========
    function openGroup(idx) {
      currentGroupIdx = idx;
      currentView = 'detail';
      const group = articlesData.groups[idx];

      document.getElementById('view-groups').style.display = 'none';
      document.getElementById('view-detail').style.display = 'block';
      document.getElementById('breadcrumb-current').textContent = group.name;
      document.getElementById('detail-title').textContent = `${group.icon} ${group.name}`;

      const totalNotes = group.notebooks.reduce((s, n) => s + n.count, 0);
      document.getElementById('detail-stats').textContent = `${group.notebooks.length} 个笔记本 · ${totalNotes} 篇笔记`;

      renderNotebookList(group);
      document.getElementById('noteSearch').value = '';
      document.getElementById('searchEmpty').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ========== 返回笔记本组 ==========
    function goBackToGroups() {
      currentView = 'groups';
      currentGroupIdx = -1;
      document.getElementById('view-groups').style.display = 'block';
      document.getElementById('view-detail').style.display = 'none';
      document.getElementById('breadcrumb-current').textContent = '技术笔记';
      document.getElementById('noteSearch').value = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ========== 渲染笔记本列表 ==========
    function renderNotebookList(group, filterText) {
      const list = document.getElementById('notebookList');
      let html = '';

      group.notebooks.forEach(nb => {
        const displayName = getDisplayName(nb.key);
        const notes = nb.notes;
        const filteredNotes = filterText
          ? notes.filter(n => n.title.toLowerCase().includes(filterText.toLowerCase()))
          : notes;

        html += `
        <div class="notebook-item" id="nb-${nb.key.replace(/[^a-zA-Z0-9]/g,'_')}">
          <div class="notebook-item-header" onclick="toggleNotebook(this.parentElement)" tabindex="0" role="button"
               onkeydown="if(event.key==='Enter')toggleNotebook(this.parentElement)">
            <div class="notebook-item-icon">📒</div>
            <div class="notebook-item-info">
              <div class="notebook-item-name">${displayName}</div>
              <div class="notebook-item-desc">${nb.desc || ''}</div>
            </div>
            <div class="notebook-item-meta">
              <span class="notebook-item-count">${notes.length} 篇</span>
              <span class="notebook-item-chevron">▾</span>
            </div>
          </div>
          <div class="notes-container">
            <div class="notes-header">
              <span>📝 ${filteredNotes.length} 篇笔记${filterText ? ' (匹配)' : ''}</span>
            </div>
            <div class="notes-list">
              ${filteredNotes.map(n => `
              <div class="note-list-item">
                <span class="note-bullet"></span>
                <a href="${n.url}" target="_blank" rel="noopener" title="${n.title}"
                   onclick="if(this.getAttribute('href')==='#'){alert('请先在印象笔记 App 中分享这篇笔记获取链接');return false;}">
                  <span class="note-title">${escapeHtml(n.title)}</span>
                </a>
                <span class="note-arrow">↗</span>
              </div>`).join('')}
              ${filteredNotes.length === 0 ? '<div class="note-list-item"><span style="color:var(--text-muted);padding:1rem;">无匹配笔记</span></div>' : ''}
            </div>
          </div>
        </div>`;
      });

      list.innerHTML = html;

      // 如果搜索有结果，自动展开所有有结果的笔记本
      if (filterText) {
        group.notebooks.forEach(nb => {
          const filteredNotes = nb.notes.filter(n =>
            n.title.toLowerCase().includes(filterText.toLowerCase())
          );
          const el = document.getElementById('nb-' + nb.key.replace(/[^a-zA-Z0-9]/g, '_'));
          if (el && filteredNotes.length > 0) {
            el.classList.add('expanded');
          }
        });
      }
    }

    // ========== 展开/折叠笔记本 ==========
    function toggleNotebook(item) {
      item.classList.toggle('expanded');
    }

    // ========== 搜索 ==========
    function performSearch() {
      const query = document.getElementById('noteSearch').value.trim();

      if (currentView === 'groups') {
        // 在笔记本组视图中搜索：直接切换到结果展示
        if (query.length === 0) {
          document.getElementById('view-detail').style.display = 'none';
          document.getElementById('view-groups').style.display = 'block';
          return;
        }

        // 全局搜索所有笔记
        const results = [];
        articlesData.groups.forEach(g => {
          g.notebooks.forEach(nb => {
            const matches = nb.notes.filter(n =>
              n.title.toLowerCase().includes(query.toLowerCase())
            );
            if (matches.length > 0) {
              results.push({
                group: g,
                notebook: nb,
                matches: matches
              });
            }
          });
        });

        renderSearchResults(results, query);
      } else if (currentView === 'detail') {
        // 在当前笔记本组内搜索
        const group = articlesData.groups[currentGroupIdx];
        const hasResults = group.notebooks.some(nb =>
          nb.notes.some(n => n.title.toLowerCase().includes(query.toLowerCase()))
        );

        document.getElementById('searchEmpty').style.display = hasResults || !query ? 'none' : 'block';
        renderNotebookList(group, query || null);
      }
    }

    function renderSearchResults(results, query) {
      document.getElementById('view-groups').style.display = 'none';
      document.getElementById('view-detail').style.display = 'block';
      document.getElementById('breadcrumb-current').textContent = `搜索: "${query}"`;
      document.getElementById('detail-title').textContent = `🔍 搜索结果: "${query}"`;

      let totalMatches = 0;
      results.forEach(r => totalMatches += r.matches.length);
      document.getElementById('detail-stats').textContent = `在 ${results.length} 个笔记本中找到 ${totalMatches} 篇笔记`;

      const list = document.getElementById('notebookList');
      let html = '';

      if (results.length === 0) {
        html = ''; // will show empty state
      } else {
        results.forEach(r => {
          const displayName = getDisplayName(r.notebook.key);
          html += `
          <div class="notebook-item expanded" id="nb-search-${r.notebook.key.replace(/[^a-zA-Z0-9]/g,'_')}">
            <div class="notebook-item-header" onclick="toggleNotebook(this.parentElement)" tabindex="0" role="button"
                 onkeydown="if(event.key==='Enter')toggleNotebook(this.parentElement)">
              <div class="notebook-item-icon">📒</div>
              <div class="notebook-item-info">
                <div class="notebook-item-name">${r.group.icon} ${displayName}</div>
                <div class="notebook-item-desc">${r.group.name}</div>
              </div>
              <div class="notebook-item-meta">
                <span class="notebook-item-count">${r.matches.length} 篇</span>
                <span class="notebook-item-chevron">▾</span>
              </div>
            </div>
            <div class="notes-container">
              <div class="notes-header">
                <span>📝 匹配的笔记</span>
              </div>
              <div class="notes-list">
                ${r.matches.map(n => `
                <div class="note-list-item">
                  <span class="note-bullet"></span>
                  <a href="${n.url}" target="_blank" rel="noopener" title="${n.title}"
                     onclick="if(this.getAttribute('href')==='#'){alert('请先在印象笔记 App 中分享这篇笔记获取链接');return false;}">
                    <span class="note-title">${highlightMatch(n.title, query)}</span>
                  </a>
                  <span class="note-arrow">↗</span>
                </div>`).join('')}
              </div>
            </div>
          </div>`;
        });
      }

      list.innerHTML = html;
      document.getElementById('searchEmpty').style.display = results.length === 0 ? 'block' : 'none';
    }

    function highlightMatch(text, query) {
      const re = new RegExp(`(${escapeRegex(query)})`, 'gi');
      return escapeHtml(text).replace(re, '<mark style="background:var(--accent);color:white;padding:0 2px;border-radius:3px;">$1</mark>');
    }

    // ========== 工具函数 ==========
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // ========== 键盘导航 ==========
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && currentView === 'detail') {
        goBackToGroups();
      }
    });

    // ========== 主题切换 ==========
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    // 初始化主题
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelector('.theme-toggle').textContent = '☀️';
      }
    })();
  </script>
</body>
</html>
