<div class="note-header"><div class="note-title">自定义管线配置</div><div class="note-meta">笔记本：管线pipelines</div></div>
<div class="note-content"><div>1.调整管线的可见范围</div><div>2.自动取消冗余的管线，所谓冗余的管线就是在相同分支上的管线，在相同分支上的管线会将之前在同一分支上的处于待定状态的管线取消</div><div>3.跳过过时的且还处于待定状态呢的部署任务</div><div>4.限制克隆时取出的变更数量，默认是50</div><div>5.任务执行时长超时设置</div><div>6.给合并请求添加测试结果覆盖：利用的是使用正则表达式来匹配任务日志中的输出，最后一个匹配到的字符串会显示在合并请求中</div><div><div class="media-placeholder">[图片/附件]</div></div><div><br /></div></div>
