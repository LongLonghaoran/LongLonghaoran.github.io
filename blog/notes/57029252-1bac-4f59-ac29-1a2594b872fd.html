<div class="note-header"><div class="note-title">pipeline介绍</div><div class="note-meta">笔记本：管线pipelines</div></div>
<div class="note-content"><div>管线是ci/cd中最顶层的组件，管线由任务与阶段组成</div><div><br /></div><div>任务由执行器来执行。相同阶段的多个任务可以并行执行，只要有足够的并发执行器</div><div>一个阶段中所有任务都成功了，管线才会移到下一阶段</div><div><br /></div><div>手动交互，默认情况下各个的阶段任务都是自动去执行，但是你也可以选择手动执行某个阶段而不通过自动执行，比方说 构建、测试、部署这3个阶段，有个时候你可能就只是需要手动去执行最后一步,配置方式是在gitlab-ci配置文件中增加when:manual</div><div><br /></div><div>管线配额管理：管线支持设置配额，限定单个管线的执行时长</div><div><span><span></span></span></div><div>在管线图标中查看依赖：</div><div><br /></div><div><span><span></span></span></div></div>
