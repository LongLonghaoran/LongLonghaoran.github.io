<div class="note-content"><div>路由的配置有静态人工配置和动态自动配置两种</div><div><div class="media-placeholder">[图片/附件]</div></div><div><br/></div><div>因特网是全球最大的互联网，它所采取的路由选择协议具有以下三个主要特点：</div><div>1.自适应：采用动态路由选择，能较好的适应网络状态的变化</div><div>2.分布式：因特网中的各路由器通过相互间的信息交互，共同完成路由信息的获取和更新</div><div>3.分层次: 将整体因特网划分为许多较小的自治系统(AS)。在自治系统内部和外部采用不同的路由选择协议，分别进行路由选择。</div><div><div class="media-placeholder">[图片/附件]</div></div><div><br/></div><div>9 20 32 44</div><div>33 45 28 40</div><div>32 42 28 20</div><div>28 34 42 30</div><div><br/></div><div>9 20 28 20</div></div>
