<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webinar — 技术笔记</title>
<style>
:root { --bg:#fff; --text:#1a1a1a; --muted:#666; --border:#e0e0e0; --code-bg:#f5f5f5; --link:#0066cc; }
@media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --text:#e0e0e0; --muted:#999; --border:#333; --code-bg:#2a2a2a; --link:#66bbff; } }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; line-height:1.7; color:var(--text); background:var(--bg); max-width:860px; margin:0 auto; padding:2rem 1.5rem; }
.note-header { border-bottom:2px solid var(--border); padding-bottom:1rem; margin-bottom:2rem; }
.note-title { font-size:1.6rem; font-weight:700; margin-bottom:0.3rem; }
.note-meta { color:var(--muted); font-size:0.85rem; }
.note-content { font-size:0.95rem; }
.note-content h1 { font-size:1.4rem; margin:1.2rem 0 0.6rem; }
.note-content h2 { font-size:1.2rem; margin:1rem 0 0.5rem; }
.note-content h3 { font-size:1.05rem; margin:0.8rem 0 0.4rem; }
.note-content p { margin:0.5rem 0; }
.note-content ul,.note-content ol { margin:0.5rem 0 0.5rem 2rem; }
.note-content li { margin:0.2rem 0; }
.note-content pre { background:var(--code-bg); padding:1rem; border-radius:6px; overflow-x:auto; margin:0.8rem 0; font-size:0.85rem; }
.note-content code { background:var(--code-bg); padding:0.1rem 0.3rem; border-radius:3px; font-size:0.88em; }
.note-content pre code { background:none; padding:0; }
.note-content blockquote { border-left:3px solid var(--border); padding-left:1rem; color:var(--muted); margin:0.8rem 0; }
.note-content a { color:var(--link); }
.note-content img { max-width:100%; height:auto; border-radius:6px; margin:0.5rem 0; }
.note-content table { border-collapse:collapse; width:100%; margin:0.8rem 0; }
.note-content th,.note-content td { border:1px solid var(--border); padding:0.5rem; }
.note-content th { background:var(--code-bg); }
.media-placeholder { background:var(--code-bg); padding:1rem; text-align:center; color:var(--muted); border-radius:6px; margin:0.5rem 0; font-size:0.85rem; }
.encrypt-placeholder { background:#fff3cd; padding:0.5rem; text-align:center; color:#856404; border-radius:6px; margin:0.5rem 0; font-size:0.85rem; }
.back-link { display:inline-block; margin-top:2rem; color:var(--link); text-decoration:none; font-size:0.85rem; }
</style>
</head>
<body>
<div class="note-header"><div class="note-title">Webinar</div><div class="note-meta">笔记本：计算机专业词汇</div></div>
<div class="note-content"><div><span style="color: rgb(119, 119, 119); font-family: Lato, &quot;Noto Sans HK&quot;, sans-serif; font-size: 16.16px; font-variant-ligatures: normal; font-variant-caps: normal; letter-spacing: normal; orphans: 2; text-indent: 0px; text-transform: none; white-space: normal; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px;">Webinar 是由「Web」和「Seminar」組合而成的詞語，意思是網上研討會。在疫情肆虐的非常時期，Webinar 讓課堂可以照常運作，早已計劃好的大型講座亦可以轉到網上形式如期進行。除了課堂和講座，當然亦可直播其他類型的活動，例如產品發佈會、音樂表演等</span></div></div>
