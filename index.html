<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙浩然 | GitHub Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 90%;
      padding: 2rem;
    }
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00cec9, #0984e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .hero p {
      color: #a0aec0;
      font-size: 1rem;
    }
    .blog-banner {
      display: block;
      background: linear-gradient(135deg, #0984e3, #00cec9);
      border-radius: 16px;
      padding: 2rem;
      text-decoration: none;
      color: white;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(9, 132, 227, 0.3);
    }
    .blog-banner:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(9, 132, 227, 0.4);
    }
    .blog-banner h2 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .blog-banner p {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .blog-banner .arrow {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }
    .link-card {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: #a0aec0;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    .link-card:hover {
      border-color: #00cec9;
      color: #00cec9;
      transform: translateY(-2px);
    }
    .footer {
      text-align: center;
      margin-top: 2.5rem;
      color: #4a5568;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>龙浩然</h1>
      <p>研发工程师 &middot; Web全栈 / 云原生 / AI应用开发</p>
    </div>

    <a href="blog/index.html" class="blog-banner">
      <h2>个人博客 &rarr;</h2>
      <p>个人介绍、技术文章目录、在线简历</p>
      <span class="arrow">点击进入 &rarr;</span>
    </a>

    <div class="links">
      <a href="blog/index.html" class="link-card">个人博客</a>
      <a href="blog/articles.html" class="link-card">技术文章</a>
      <a href="blog/resume.html" class="link-card">在线简历</a>
      <a href="Golang" class="link-card">Golang</a>
      <a href="fio/html" class="link-card">fio 文档</a>
      <a href="fio.macOS.man.txt" class="link-card">fio man (macOS)</a>
      <a href="gnu_make" class="link-card">GNU make 文档</a>
      <a href="cpython-doc" class="link-card">CPython 文档</a>
    </div>

    <div class="footer">
      &copy; 2026 龙浩然 &middot; Powered by GitHub Pages
    </div>
  </div>
</body>
</html>
